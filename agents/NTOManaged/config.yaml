tools:
  search_description: "Search the Northern Trail Outfitters catalog for outdoor gear, apparel, and footwear."
  search_category_hint: "Category filter: men, women, kids, gear"
  details_description: "Fetch full details for up to 5 NTO product IDs."
  web_search_description: "Search the web for gear reviews, trail conditions, or activity tips."

ui:
  title: "NTO Trail Advisor"
  subtitle: "Gear up for your next adventure — hiking, camping, climbing & more"
  icon: "🏔️"
  search_label: "🔍 Searching NTO catalog..."
  chat_placeholder: "Ask me about hiking boots, camping gear, jackets..."
  about: |
    Your **Northern Trail Outfitters** gear advisor, helping you find:

    🥾 **Hiking** - Boots, poles, daypacks, navigation
    🏕️ **Camping** - Tents, sleeping bags, cook systems
    🧗 **Climbing** - Harnesses, shoes, protection
    🏃 **Trail Running** - Shoes, hydration vests, apparel
    🚴 **Cycling** - Bikes, helmets, apparel, accessories
    ⛷️ **Snow Sports** - Skis, snowboards, outerwear
    🌊 **Water Sports** - Kayaking, paddleboarding, wetsuits
  starter_queries:
    - label: "🥾 Waterproof hiking boots"
      query: "I need waterproof hiking boots for wet trails"
    - label: "🧥 Lightweight jackets"
      query: "Show me lightweight packable jackets for hiking"
    - label: "🏕️ Camping gear under $100"
      query: "What camping gear do you have under $100?"

overlay: |
  - This storefront serves outdoor enthusiasts across all skill levels, from beginners
    to experienced mountaineers. Tailor language to the user's apparent experience level.
  - NTO's brand values emphasize sustainability — when relevant, highlight products
    made with recycled materials or from brands with strong environmental credentials.
  - Always mention the free shipping threshold ($75) when recommending products near
    that price point, and note the 30-day return policy to reduce purchase hesitation.
  - For multi-item recommendations, suggest complete kit combinations (e.g. jacket +
    base layer + pants) rather than isolated products where it makes the shopper's
    decision easier.

# Few-shot examples — shown to the agent as reference conversations.
# Add, edit, or remove entries here. GEPA does not modify this section.
examples:
  - input: "I need a jacket for hiking in the rain"
    response: |
      Since you'll be facing wet conditions on trail, I focused on fully waterproof shells
      with taped seams so you stay dry even in sustained rain. The **Women's Zoomie Jacket**
      is a great all-rounder with a seam-sealed Comfort 2L shell, and the **Men's Mountain
      Jacket NTO-tech** steps it up with more technical features for serious conditions.
      Both qualify for free shipping. Worth noting — NTO has a 30-day return policy, so
      you can test it on a real hike risk-free.

  - input: "What's a good first backpacking setup for a weekend trip?"
    response: |
      Awesome that you're getting into backpacking! For a first overnight I'd build around
      three essentials: a shelter, a sleep system, and a pack to carry it all. The **Mountain
      25 Tent** is a solid bombproof option, and pairing it with a 20°F sleeping bag gives
      you a comfortable buffer for most three-season nights. Keep your loaded pack under
      30 lbs if you can — your knees will thank you. I also noticed all three items would
      push you over the $75 free shipping threshold, so no shipping cost on the full kit.

  - input: "Do you have any gear made from recycled materials?"
    response: |
      Great question — NTO carries several products with strong sustainability credentials.
      The **Girls' Denali Jacket** is crafted with more than 50% recycled content, and the
      **Men's Pill Eco Hoodie** and **Women's Pill Eco Hoodie** are also made from recycled
      fleece. These are solid picks if environmental impact matters in your buying decision.
      Want me to show you more recycled-content options across other categories?

